<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lost&Found</title>

    <link rel="stylesheet " href="lostitems.css" />
  </head>
  <body>
    <!-- NAVIGATION хэсэг-->
    <nav class="nav">
      <!-- Nav зүүн хэсэг: logo + сайтын нэр -->
      <div class="nav-left">
        <img src="images/logo.png" alt="Muis logo" class="logo" />
        <div class="nav-logo-text">
          <strong>Lost&Found</strong>
          <small>NUM/МУИС</small>
        </div>
      </div>
      <!-- Nav дунд хэсэг: цэсүүд -->
      <div class="nav-center">
        <a href="#" class="active">Home Items</a>
        <a href="#">Lost Items</a>
        <a href="#">Found Items</a>
      </div>
      <!-- Nav баруун хэсэг: хайлт + post + login + profile-->
      <div class="nav-right">
        <div class="nav-search">
          <svg
            width="20px"
            height="20px"
            viewBox="0 -0.5 25 25"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              fill-rule="evenodd"
              clip-rule="evenodd"
              d="M5.5 10.7655C5.50003 8.01511 7.44296 5.64777 10.1405 5.1113C12.8381 4.57483 15.539 6.01866 16.5913 8.55977C17.6437 11.1009 16.7544 14.0315 14.4674 15.5593C12.1804 17.0871 9.13257 16.7866 7.188 14.8415C6.10716 13.7604 5.49998 12.2942 5.5 10.7655Z"
              stroke="#000000"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M17.029 16.5295L19.5 19.0005"
              stroke="#000000"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <input type="text" placeholder="Search items, locations..." />
        </div>
        <a href="#" class="post-btn">Post Items</a>
        <a href="login.html" class="login-btn">Login</a>
        <a href="profile.html" class="profile-btn">JD</a>
      </div>
    </nav>
    <main class="container">
      <section class="form-section">
        <h1>Report an Item</h1>
        <p class="subtitle">
          Help us keep the campus community safe and united.
        </p>

        <form class="form">
          <!-- Toggle -->
          <div class="toggle">
            <button type="button" class="active">
              <b>I Lost Something</b>
            </button>
            <button type="button" class="active2">I Found Something</button>
          </div>

          <!-- Input fields -->
          <div class="form-group">
            <label>Item Name</label>
            <input type="text" placeholder="e.g., Blue Nike Backpack" />
          </div>

          <div class="grid-2">
            <div class="form-group">
              <label>Category</label>
              <select class="FilterButton" name="categoryFilter">
                <option>All Category</option>
                <option>Phone</option>
                <option>Wallet</option>
                <option>ID card</option>
                <option>Bag</option>
                <option>Laptop</option>
                <option>Keys</option>
                <option>Other</option>
              </select>
            </div>

            <div class="form-group">
              <label>Location</label>
              <select class="FilterButton" name="locationFilter">
                <option>All Location</option>
                <option>1-r bair</option>
                <option>2-r bair</option>
                <option>3-r bair</option>
                <option>4-r bair</option>
                <option>5-r bair</option>
                <option>7-r bair</option>
                <option>8-r bair</option>
                <option>Library</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label>Date Found</label>
            <input type="date" />
          </div>

          <div class="form-group">
            <label>Description</label>
            <textarea placeholder="Provide details..."></textarea>
          </div>

          <!-- Upload -->
          <div class="upload">
            <p>Click to upload an image</p>
          </div>

          <!-- Contact -->
          <div class="grid-2">
            <div class="form-group">
              <label>Phone</label>
              <input type="tel" placeholder="+976..." />
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" placeholder="student@uni.edu" />
            </div>
          </div>

          <button class="btn-submit">Submit Report</button>
        </form>
      </section>
    </main>

    <footer class="footer">
      <p>© 2026 Lost & Found</p>
    </footer>
  </body>
</html>
